server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json text/plain;

    # Single-page app: serve index.html for any path that isn't a real file,
    # so a hard refresh / deep link never 404s. Not strictly needed today
    # (this app has no client-side routing) but harmless and future-proof.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
