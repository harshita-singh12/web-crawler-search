global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: crawler
    static_configs:
      - targets: ["crawler:9100"]

  - job_name: indexer
    static_configs:
      - targets: ["indexer:9101"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
