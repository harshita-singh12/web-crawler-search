name: wifey-web-crawler-search

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crawler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crawler}
      POSTGRES_DB: ${POSTGRES_DB:-crawler}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crawler} -d ${POSTGRES_DB:-crawler}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-crawler}:${POSTGRES_PASSWORD:-crawler}@postgres:5432/${POSTGRES_DB:-crawler}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-raw-pages}
      MAX_DEPTH: ${MAX_DEPTH:-2}
      MAX_PAGES: ${MAX_PAGES:-200}
      DEFAULT_CRAWL_DELAY_SECONDS: ${DEFAULT_CRAWL_DELAY_SECONDS:-3}
      NUM_WORKER_TASKS: ${NUM_WORKER_TASKS:-4}
      ALLOW_OFFSITE_LINKS: ${ALLOW_OFFSITE_LINKS:-false}
      RECRAWL_INTERVAL_HOURS: ${RECRAWL_INTERVAL_HOURS:-24}
    ports:
      - "${CRAWLER_METRICS_PORT:-9100}:9100"
    restart: unless-stopped

  indexer:
    build:
      context: .
      dockerfile: indexer/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-crawler}:${POSTGRES_PASSWORD:-crawler}@postgres:5432/${POSTGRES_DB:-crawler}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-raw-pages}
      PAGERANK_INTERVAL_SECONDS: ${PAGERANK_INTERVAL_SECONDS:-30}
    ports:
      - "${INDEXER_METRICS_PORT:-9101}:9101"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-crawler}:${POSTGRES_PASSWORD:-crawler}@postgres:5432/${POSTGRES_DB:-crawler}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-raw-pages}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      PAGERANK_BOOST_ALPHA: ${PAGERANK_BOOST_ALPHA:-2.0}
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-3000}:80"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - crawler
      - indexer
      - api

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
